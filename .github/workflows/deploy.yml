name: Deploy and Post to Note

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  archive-and-deploy:
    name: Archive and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install packages
        run: cd scripts && npm install

      - name: Run daily update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-update.js

      - name: Create archive
        run: |
          mkdir -p archive
          DATE=$(date +'%Y-%m-%d')
          cp index.html archive/${DATE}.html
          echo "Created archive/${DATE}.html"

      - name: Build archive index
        run: node scripts/build-archive.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 全変更をステージング
          git add index.html archive/

          # 変更がなければスキップ
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # リモートの最新を取得してからコミット
          git pull --rebase origin main

          # 再度ステージング（pullで変更が混ざった場合に備えて）
          git add index.html archive/

          # 変更がなければスキップ
          if git diff --staged --quiet; then
            echo "No changes after pull"
            exit 0
          fi

          git commit -m "Auto update $(date +'%Y-%m-%d')"
          git push origin main
          echo "Push completed"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post-to-note:
    name: Post to Note
    runs-on: ubuntu-latest
    needs: archive-and-deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd scripts && npm install
      - name: Generate note draft
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: node scripts/post-to-note.js
      - name: Upload draft
        uses: actions/upload-artifact@v4
        with:
          name: note-draft
          path: note-draft.txt
