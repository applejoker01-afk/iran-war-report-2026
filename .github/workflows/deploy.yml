name: Deploy & Post to Note

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  archive-and-deploy:
    name: Archive & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: チェックアウト（履歴フル取得）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージのインストール
        run: |
          cd scripts && npm install

      - name: 日付別アーカイブを作成
        run: |
          mkdir -p archive
          DATE=$(date +'%Y-%m-%d')
          cp index.html archive/${DATE}.html
          echo "✅ archive/${DATE}.html を作成しました"

      - name: アーカイブ一覧ページを生成
        run: node scripts/build-archive.js

      - name: アーカイブをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --staged --quiet; then
            echo "変更なし・スキップ"
          else
            git commit -m "アーカイブ追加: $(date +'%Y-%m-%d')"
            git push origin main
            echo "✅ プッシュ完了"
          fi

      - name: GitHub Pages 設定
        uses: actions/configure-pages@v4

      - name: アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4

  post-to-note:
    name: Post Article to Note
    runs-on: ubuntu-latest
    needs: archive-and-deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存パッケージのインストール
        run: cd scripts && npm install
      - name: Note下書きを生成
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: node scripts/post-to-note.js
      - name: 下書きファイルをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: note-draft
          path: note-draft.txt
