name: Deploy & Post to Note

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  post-to-note:
    name: Post Article to Note
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存パッケージのインストール
        run: cd scripts && npm install
      - name: Note下書きを生成
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: node scripts/post-to-note.js
      - name: 下書きファイルをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: note-draft
          path: note-draft.txt
